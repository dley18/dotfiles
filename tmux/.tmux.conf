# Prefix already set to Ctrl+a (you did this)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quality of life basics
set -g mouse on                    # click to focus panes, scroll with trackpad
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"   # true color in Ghostty
set -g base-index 1                # windows start at 1, not 0
setw -g pane-base-index 1          # panes too
set -g renumber-windows on         # auto-renumber if you close a window
set -g history-limit 50000         # way more scrollback
set -g escape-time 0               # no delay when pressing Escape (critical for nvim)
set -g focus-events on             # lets nvim know when pane gains focus

# Intuitive splits (| and - are way more memorable than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config without restarting
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vim-style pane navigation (instead of arrow keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with capital HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Better copy mode (vim keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'egel/tmux-gruvbox'

# Set to match your nvim/ghostty variant (dark is most common)
set -g @tmux-gruvbox 'dark'
# other options: 'dark256' 'light' 'light256'

# Nicer status bar content
set -g status-left "[#S] "
set -g status-right " %H:%M %d-%b "
set -g status-left-length 20
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# Must be the very last line
run '~/.tmux/plugins/tpm/tpm'
